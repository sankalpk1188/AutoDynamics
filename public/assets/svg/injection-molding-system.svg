<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img" aria-labelledby="imDiagramTitle imDiagramDesc">
  <title id="imDiagramTitle">General injection molding system</title>
  <desc id="imDiagramDesc">Original schematic showing mold, nozzle, heated barrel with screw, hopper, hydraulic drive, and motor.</desc>
  <defs>
    <linearGradient id="barrelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2f6eb5"/>
      <stop offset="100%" stop-color="#1a4578"/>
    </linearGradient>
    <linearGradient id="hydraulicGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a7ec8"/>
      <stop offset="100%" stop-color="#1e4f86"/>
    </linearGradient>
    <pattern id="screwPattern" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(-24)">
      <line x1="0" y1="0" x2="14" y2="14" stroke="#8eaed0" stroke-width="2.2"/>
    </pattern>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5a9ef5"/>
    </marker>
  </defs>
  <rect x="36" y="148" width="88" height="104" rx="4" fill="#5a6f88" stroke="#8eaed0" stroke-width="2"/>
  <rect x="124" y="148" width="88" height="104" rx="4" fill="#6a8098" stroke="#8eaed0" stroke-width="2"/>
  <rect x="108" y="178" width="32" height="44" rx="3" fill="#0d1a2e" stroke="#5a9ef5" stroke-width="1.5"/>
  <text x="124" y="132" text-anchor="middle" fill="#9fc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Mold</text>
  <polygon points="212,200 248,188 248,212" fill="#4a90d9" stroke="#7eb8ff" stroke-width="1.5"/>
  <text x="230" y="248" text-anchor="middle" fill="#9fc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14">Nozzle</text>
  <rect x="248" y="176" width="360" height="48" rx="8" fill="url(#barrelGrad)" stroke="#5a9ef5" stroke-width="2"/>
  <rect x="262" y="186" width="332" height="28" rx="6" fill="url(#screwPattern)" opacity="0.85"/>
  <g stroke="#f0c24a" stroke-width="3" stroke-linecap="round">
    <line x1="318" y1="168" x2="332" y2="232"/>
    <line x1="348" y1="168" x2="362" y2="232"/>
    <line x1="378" y1="168" x2="392" y2="232"/>
  </g>
  <text x="355" y="158" text-anchor="middle" fill="#f0c24a" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Heater</text>
  <polygon points="500,176 540,176 560,118 480,118" fill="#2a4f78" stroke="#7eb8ff" stroke-width="2"/>
  <polygon points="488,118 552,118 540,100 500,100" fill="#3a6ea8" stroke="#7eb8ff" stroke-width="1.5"/>
  <g fill="#c5d4e8">
    <circle cx="510" cy="138" r="3.5"/><circle cx="525" cy="132" r="3.5"/><circle cx="540" cy="138" r="3.5"/>
    <circle cx="518" cy="150" r="3.5"/><circle cx="533" cy="146" r="3.5"/>
  </g>
  <text x="520" y="88" text-anchor="middle" fill="#9fc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Raw Material</text>
  <rect x="608" y="120" width="118" height="160" rx="6" fill="url(#hydraulicGrad)" stroke="#7eb8ff" stroke-width="2"/>
  <rect x="646" y="136" width="42" height="128" rx="4" fill="#8ec0f5" stroke="#d8ecff" stroke-width="1.5"/>
  <rect x="656" y="148" width="22" height="104" rx="3" fill="#cfe6ff"/>
  <text x="667" y="108" text-anchor="middle" fill="#9fc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Hydraulic</text>
  <text x="667" y="126" text-anchor="middle" fill="#9fc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Mechanism</text>
  <rect x="636" y="292" width="62" height="34" rx="5" fill="#6a7f96" stroke="#9bb3ce" stroke-width="1.5"/>
  <circle cx="667" cy="309" r="9" fill="none" stroke="#d8ecff" stroke-width="2"/>
  <line x1="667" y1="309" x2="667" y2="301" stroke="#d8ecff" stroke-width="2" stroke-linecap="round"/>
  <text x="667" y="342" text-anchor="middle" fill="#9fc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14">Motor</text>
  <line x1="760" y1="200" x2="860" y2="200" stroke="#5a9ef5" stroke-width="2.5" marker-end="url(#arrowHead)" opacity="0.55"/>
  <text x="810" y="188" text-anchor="middle" fill="#7eb8ff" font-family="Segoe UI, Arial, sans-serif" font-size="12">Melt flow</text>
  <text x="460" y="378" text-anchor="middle" fill="#8eaed0" font-family="Segoe UI, Arial, sans-serif" font-size="15">Fig. 1 - General injection molding system</text>
</svg>
