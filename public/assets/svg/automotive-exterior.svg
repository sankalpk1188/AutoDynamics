<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="as-highlight-exterior" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ec8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0082c6" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="as-glow-exterior" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g id="vehicle-base" opacity="0.35">
    <path fill="none" stroke="#3d5a73" stroke-width="1.2" d="M60 340 L120 300 L200 270 L360 250 L520 255 L660 280 L740 320 L760 360 L720 390 L560 400 L280 395 L120 380 L70 360 Z"/>
